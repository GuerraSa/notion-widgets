<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notion Weather</title>
<style>
  body {
    margin: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh;
    background-color: transparent; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #37352f; 
    overflow: hidden;
  }
  .container {
    text-align: center; 
    padding: 25px 40px; 
    border: 1px solid #e9e9e7; 
    border-radius: 10px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  #temp-container { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 15px; 
  }
  #icon { font-size: 3.5rem; }
  #temp { 
    font-size: 4rem; 
    font-weight: 700; 
    font-variant-numeric: tabular-nums; 
    letter-spacing: -2px;
  }
  #desc { 
    font-size: 0.9rem; 
    font-weight: 600; 
    color: #9b9a97; 
    margin-top: 10px; 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
  }
  
  /* Automatic Dark Mode Support */
  @media (prefers-color-scheme: dark) {
    body { color: rgba(255, 255, 255, 0.9); }
    .container { border-color: #373737; }
  }
</style>
</head>
<body>
  <div class="container">
    <div id="temp-container">
      <div id="icon">⏳</div>
      <div id="temp">--°C</div>
    </div>
    <div id="desc">Fetching...</div>
  </div>

  <script>
    async function fetchWeather() {
      try {
        // The latitude and longitude are set to Coquitlam, BC
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.2838&longitude=-122.7932&current=temperature_2m,weather_code');
        const data = await res.json();
        
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;
        
        let desc = "Clear";
        let icon = "☀️";
        
        // Match the weather code to the right emoji and description
        if (code === 1 || code === 2 || code === 3) { desc = "Cloudy"; icon = "☁️"; }
        else if (code >= 45 && code <= 48) { desc = "Fog"; icon = "🌫️"; }
        else if (code >= 51 && code <= 67) { desc = "Rain"; icon = "🌧️"; }
        else if (code >= 71 && code <= 77) { desc = "Snow"; icon = "❄️"; }
        else if (code >= 80 && code <= 82) { desc = "Showers"; icon = "🌦️"; }
        else if (code >= 95) { desc = "Storm"; icon = "⛈️"; }

        // Update the HTML
        document.getElementById('temp').innerText = temp + "°C";
        document.getElementById('icon').innerText = icon;
        document.getElementById('desc').innerText = "Coquitlam • " + desc;
        
      } catch (e) {
        document.getElementById('desc').innerText = "Weather unavailable";
      }
    }
    
    // Run immediately, then update every 30 minutes
    fetchWeather();
    setInterval(fetchWeather, 1800000); 
  </script>
</body>
</html>
